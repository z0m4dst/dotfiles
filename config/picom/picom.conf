#################################
# BACKEND (estable para tu entorno)
#################################

backend = "xrender";
vsync = true;

# ❌ Sin bordes redondeados (costosos + glitch con transparencia)
corner-radius = 15;
round-borders = 15;


#################################
# SOMBRAS (mínimas, no invasivas)
#################################

shadow = true;

# Sutiles → apenas separación visual
shadow-radius = 7;
shadow-offset-x = -5;
shadow-offset-y = -5;
shadow-opacity = 0.12;

# No aplicar donde rompe estética
shadow-exclude = [
  "class_g = 'Alacritty'",
  "class_g = 'Rofi'",
  "class_g = 'Polybar'"
];


#################################
# OPACIDAD
#################################

# ✔ Prioridad: fluidez sobre efecto
active-opacity = 1.0;
inactive-opacity = 1.0;

# Alacritty maneja su propia transparencia
opacity-rule = [
  #"100_class_g = 'Rofi'"
  "100:class_g = 'Alacritty'"
];


#################################
# SIN BLUR (hardware limitado)
#################################

blur:
{
  method = "none";
}


#################################
# PERFORMANCE
#################################

detect-client-opacity = true;
detect-transient = true;

# Evita problemas con cosas raras de bordes
detect-rounded-corners = false;

# ⚠️ En entornos como el tuyo puede mejorar fluidez
use-damage = false;


#################################
# EXCLUSIONES IMPORTANTES
#################################

# Evita comportamientos raros con rofi
focus-exclude = [
  "class_g = 'Rofi'"
];


#################################
# COMPATIBILIDAD
#################################

mark-wmwin-focused = true;
mark-ovredir-focused = true;


#################################
# FIN — limpio, estable, sin ruido
#################################
